name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pdo_sqlite, sqlite3
          coverage: none
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.testing .env && php artisan key:generate --force
      - run: npm run build
      - run: php artisan test
      - run: LARAVEL_BYPASS_ENV_CHECK=1 npm run test -- --run
      - name: Notify Discord on failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.ANOOD_DISCORD_URL }}
          status: ${{ job.status }}
          title: "CI 失敗 - ${{ github.ref_name }}"
          description: "Commit: ${{ github.sha }}\n${{ github.event.head_commit.message }}"
          color: 0xff0000
