name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pdo_sqlite, sqlite3
          coverage: none

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Update composer.lock if needed
        run: composer update --no-interaction --prefer-dist --lock

      - name: Commit composer.lock if changed
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git diff --staged --quiet || git commit -m "chore: update composer.lock [skip ci]" && git push

      - run: npm ci
      - run: cp .env.testing .env && php artisan key:generate --force
      - run: npm run build
      - run: php artisan test
      - run: LARAVEL_BYPASS_ENV_CHECK=1 npm run test -- --run
