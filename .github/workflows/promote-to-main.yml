name: Promote develop to main

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "develop is $AHEAD commits ahead of main"

      - name: Merge develop into main
        if: steps.check.outputs.ahead != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          DEVELOP_SHA=$(git rev-parse --short origin/develop)
          git merge --no-ff -X theirs origin/develop -m "chore: promote develop@${DEVELOP_SHA} to main"
          git push origin main
          echo "promote done"
