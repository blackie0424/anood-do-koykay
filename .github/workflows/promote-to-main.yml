name: Promote develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "develop is $AHEAD commits ahead of main"

      - name: Open or update PR develop → main
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 找出現有的 open PR
          PR_NUM=$(gh pr list --base main --head develop --state open --json number -q '.[0].number')

          if [ -z "$PR_NUM" ]; then
            # 沒有現有 PR，建立新的
            PR_URL=$(gh pr create \
              --base main \
              --head develop \
              --title "chore: auto-promote develop to main" \
              --body "由 workflow 自動建立，CI 通過後自動 merge 至 main。")
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "建立 PR #$PR_NUM"
          else
            echo "PR #$PR_NUM 已存在"
          fi

          # 啟用 auto-merge
          gh pr merge "$PR_NUM" --merge --auto --delete-branch=false
          echo "✅ PR #$PR_NUM auto-merge 已啟用"
