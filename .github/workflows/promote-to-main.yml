name: Promote develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "develop is $AHEAD commits ahead of main"

      - name: Create PR develop → main (if not exists)
        if: steps.check.outputs.ahead != '0'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 嘗試建立 PR，若已存在則取得現有 PR number
          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING 已存在"
            echo "number=$EXISTING" >> $GITHUB_OUTPUT
          else
            NEW=$(gh pr create \
              --base main \
              --head develop \
              --title "chore: auto-promote develop → main" \
              --body "由 workflow 自動建立。CI 通過後將自動 merge 至 main。" \
              --label "" 2>/dev/null | grep -oE '[0-9]+$')
            echo "建立 PR #$NEW"
            echo "number=$NEW" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge
        if: steps.check.outputs.ahead != '0' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ steps.pr.outputs.number }}
          gh pr merge "$PR_NUM" --merge --auto --delete-branch=false
          echo "✅ PR #$PR_NUM auto-merge 已啟用，CI 通過後將自動 merge"
