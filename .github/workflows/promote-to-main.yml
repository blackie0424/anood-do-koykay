name: Promote develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    # CI 在 PR 階段已跑過，develop 上的 commit 都是通過驗證的
    # 不需要在這裡再等 CI，避免 race condition 與 check-run 查詢不穩定的問題
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # 使用 PAT 而非 GITHUB_TOKEN，確保 push to main 能觸發後續 workflow
          token: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "develop is $AHEAD commits ahead of main"

      - name: Merge develop into main
        if: steps.check.outputs.ahead != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main

          COMMIT_LOG=$(git log origin/main..origin/develop --oneline --no-merges | sed 's/^/- /')
          DEVELOP_SHA=$(git rev-parse --short origin/develop)

          MERGE_MSG="chore: promote develop@${DEVELOP_SHA} → main

Included commits:
${COMMIT_LOG}"

          git merge --no-ff -X theirs origin/develop -m "$MERGE_MSG"
          git push origin main
          echo "✅ develop → main merge 完成"
