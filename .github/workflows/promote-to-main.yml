name: Promote develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          echo "等待 CI 完成（SHA: $SHA）..."
          for i in $(seq 1 30); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/$SHA/check-runs \
              --jq '[.check_runs[] | select(.name == "ci")] | .[0] | {status: .status, conclusion: .conclusion}')
            
            RUN_STATUS=$(echo "$STATUS" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            CONCLUSION=$(echo "$STATUS" | grep -o '"conclusion":"[^"]*"' | cut -d'"' -f4)
            
            echo "第 $i 次檢查：status=$RUN_STATUS conclusion=$CONCLUSION"
            
            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ CI 通過"
                exit 0
              else
                echo "❌ CI 失敗（$CONCLUSION），停止 promote"
                exit 1
              fi
            fi
            
            echo "CI 尚未完成，等待 20 秒..."
            sleep 20
          done
          
          echo "⏱ 等待逾時（10 分鐘）"
          exit 1

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "develop is $AHEAD commits ahead of main"

      - name: Merge develop into main
        if: steps.check.outputs.ahead != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main

          # 產生這次帶入的 commit 清單（develop 比 main 多的部分）
          COMMIT_LOG=$(git log origin/main..origin/develop --oneline --no-merges | sed 's/^/- /')
          DEVELOP_SHA=$(git rev-parse --short origin/develop)

          MERGE_MSG="chore: promote develop@${DEVELOP_SHA} → main

Included commits:
${COMMIT_LOG}"

          git merge --no-ff -X theirs origin/develop -m "$MERGE_MSG"
          git push origin main
          echo "✅ develop → main merge 完成"
